version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: n8n-mysql
    restart: always

    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=n8n
      - MYSQL_USER=n8n
      - MYSQL_PASSWORD=

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql
  n8n:
    image: n8nio/n8n:latest
    restart: always

    ports:
      - "5678:5678"

    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production

      # Bảo mật cơ bản
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123

      # Timezone VN
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh

      # Data encryption (quan trọng)
      - N8N_ENCRYPTION_KEY=super-secret-key-change-me

    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
  mysql_data: